<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>어은중 2학년 6반 미친시간 온라인 전시회</title>
  <style>
    body { text-align: center; font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; }

    .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
    .art-piece { border: 10px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; background: white; padding-bottom: 15px; border-radius: 5px; }
    .art-piece img { width: 100%; height: auto; border-radius: 3px; }
    .title { font-weight: bold; margin-top: 15px; font-size: 1.1em; color: #555; }
  </style>
</head>
<body>
  <h1>🎨 어은중 2학년 6반 <br> '미친시간' 온라인 전시회</h1>
  <p>우리 반 학생들의 톡톡 튀는 아이디어를 감상해 보세요!</p>

  <div class="gallery">
    <div class="art-piece">
      <img src="art1.jpg" alt="작품">
      <div class="title">김민수 학생</div>
    </div>
    
    <div class="art-piece">
      <img src="art2.jpg" alt="작품">
      <div class="title">이지은 학생</div>
    </div>
    
    </div>
</body>
</html>
